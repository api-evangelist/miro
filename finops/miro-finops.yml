meters:
- name: member_seats
  description: Per-Member subscription. Starter $8/$10, Business $20/$25, Enterprise
    contract.
  unit: seat
  aggregation: sum
  dimensions:
  - workspace
  - team
  - plan
- name: ai_credits
  description: Monthly AI credits per member; Free 10/team, Starter 25/member,
    Business 50/member, Enterprise custom.
  unit: credit
  aggregation: sum
  dimensions:
  - workspace
  - member
principles:
- name: Visibility
  description: Use Miro admin reports to inventory active members per workspace and team;
    AI credit usage per member.
- name: Allocation
  description: Allocate seats by team membership; tag enterprise contracts to procuring
    business units.
- name: Optimization
  description: Reclaim seats from inactive members; choose annual billing for the discount;
    exploit free Visitors/Guests for read-only collaborators; right-size plan tier to AI
    credit needs.
- name: Accountability
  description: Assign workspace and organization owners; review quarterly seat counts
    against active-user reports.
