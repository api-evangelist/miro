serviceCategory: Productivity
billingModel:
  pricingCategory: Subscription (Per Seat)
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Miro
  ServiceCategory: Productivity
  ProviderName: Miro
  PublisherName: Miro
  InvoiceIssuerName: Miro
