description: FOCUS-aligned FinOps profile for Miro. Miro bills as a per-Member monthly
  subscription across Free, Starter, Business, and Enterprise tiers. AI usage is metered
  via per-member monthly AI credit allowances; overage requires plan upgrade or enterprise
  contract terms. Visitors and Guests are free on paid tiers.
