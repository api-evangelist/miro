description: Miro plans reconciled against the public Miro pricing page. Per-member
  monthly subscription with significant feature gating across Free, Starter, Business,
  and Enterprise tiers. Developer access (REST API, Web SDK) is available cross-tier;
  SCIM, audit logs, and enterprise org/team APIs require Enterprise.
sources:
- https://miro.com/pricing/
- https://developers.miro.com/reference/overview
