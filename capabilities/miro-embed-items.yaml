naftiko: 1.0.0-alpha2
info:
  label: Miro Developer Platform — Embed items
  description: 'Miro Developer Platform — Embed items. 4 operations. Lead operation: Create embed item. Self-contained Naftiko
    capability covering one Miro business surface.'
  tags:
  - Miro
  - Embed items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MIRO_API_KEY: MIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: miro-embed-items
    baseUri: https://api.miro.com
    description: Miro Developer Platform — Embed items business capability. Self-contained, no shared references.
    resources:
    - name: v2-boards-board_id-embeds
      path: /v2/boards/{board_id}/embeds
      operations:
      - name: createembeditem
        method: POST
        description: Create embed item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board where you want to create the item.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-boards-board_id-embeds-item_id
      path: /v2/boards/{board_id}/embeds/{item_id}
      operations:
      - name: getembeditem
        method: GET
        description: Get embed item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board from which you want to retrieve a specific item.
          required: true
        - name: item_id
          in: path
          type: string
          description: Unique identifier (ID) of the item that you want to retrieve.
          required: true
      - name: updateembeditem
        method: PATCH
        description: Update embed item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board where you want to update the item.
          required: true
        - name: item_id
          in: path
          type: string
          description: Unique identifier (ID) of the item that you want to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteembeditem
        method: DELETE
        description: Delete embed item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board from which you want to delete the item.
          required: true
        - name: item_id
          in: path
          type: string
          description: Unique identifier (ID) of the item that you want to delete.
          required: true
    authentication:
      type: bearer
      token: '{{env.MIRO_API_KEY}}'
  exposes:
  - type: rest
    namespace: miro-embed-items-rest
    port: 8080
    description: REST adapter for Miro Developer Platform — Embed items. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/boards/{board-id}/embeds
      name: v2-boards-board-id-embeds
      description: REST surface for v2-boards-board_id-embeds.
      operations:
      - method: POST
        name: createembeditem
        description: Create embed item
        call: miro-embed-items.createembeditem
        with:
          board_id: rest.board_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/boards/{board-id}/embeds/{item-id}
      name: v2-boards-board-id-embeds-item-id
      description: REST surface for v2-boards-board_id-embeds-item_id.
      operations:
      - method: GET
        name: getembeditem
        description: Get embed item
        call: miro-embed-items.getembeditem
        with:
          board_id: rest.board_id
          item_id: rest.item_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateembeditem
        description: Update embed item
        call: miro-embed-items.updateembeditem
        with:
          board_id: rest.board_id
          item_id: rest.item_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteembeditem
        description: Delete embed item
        call: miro-embed-items.deleteembeditem
        with:
          board_id: rest.board_id
          item_id: rest.item_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: miro-embed-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for Miro Developer Platform — Embed items. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-embed-item
      description: Create embed item
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: miro-embed-items.createembeditem
      with:
        board_id: tools.board_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-embed-item
      description: Get embed item
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: miro-embed-items.getembeditem
      with:
        board_id: tools.board_id
        item_id: tools.item_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-embed-item
      description: Update embed item
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: miro-embed-items.updateembeditem
      with:
        board_id: tools.board_id
        item_id: tools.item_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-embed-item
      description: Delete embed item
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: miro-embed-items.deleteembeditem
      with:
        board_id: tools.board_id
        item_id: tools.item_id
      outputParameters:
      - type: object
        mapping: $.
