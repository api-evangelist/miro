naftiko: 1.0.0-alpha2
info:
  label: Miro Developer Platform — Board members
  description: 'Miro Developer Platform — Board members. 5 operations. Lead operation: Share board. Self-contained Naftiko
    capability covering one Miro business surface.'
  tags:
  - Miro
  - Board members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MIRO_API_KEY: MIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: miro-board-members
    baseUri: https://api.miro.com
    description: Miro Developer Platform — Board members business capability. Self-contained, no shared references.
    resources:
    - name: v2-boards-board_id-members
      path: /v2/boards/{board_id}/members
      operations:
      - name: shareboard
        method: POST
        description: Share board
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board to which the board member belongs.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: getboardmembers
        method: GET
        description: Get all board members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: string
        - name: offset
          in: query
          type: string
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board to which the board member belongs.
          required: true
    - name: v2-boards-board_id-members-board_member_id
      path: /v2/boards/{board_id}/members/{board_member_id}
      operations:
      - name: getspecificboardmember
        method: GET
        description: Get specific board member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board to which the board member belongs.
          required: true
        - name: board_member_id
          in: path
          type: string
          description: Unique identifier (ID) of the board member whose role you want to retrieve.
          required: true
      - name: updateboardmember
        method: PATCH
        description: Update board member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board for which you want to update the role of the board member.
          required: true
        - name: board_member_id
          in: path
          type: string
          description: Unique identifier (ID) of the board member whose role you want to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removeboardmember
        method: DELETE
        description: Remove board member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board from which you want to delete an item.
          required: true
        - name: board_member_id
          in: path
          type: string
          description: Unique identifier (ID) of the board member whose role you want to delete.
          required: true
    authentication:
      type: bearer
      token: '{{env.MIRO_API_KEY}}'
  exposes:
  - type: rest
    namespace: miro-board-members-rest
    port: 8080
    description: REST adapter for Miro Developer Platform — Board members. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/boards/{board-id}/members
      name: v2-boards-board-id-members
      description: REST surface for v2-boards-board_id-members.
      operations:
      - method: POST
        name: shareboard
        description: Share board
        call: miro-board-members.shareboard
        with:
          board_id: rest.board_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getboardmembers
        description: Get all board members
        call: miro-board-members.getboardmembers
        with:
          limit: rest.limit
          offset: rest.offset
          board_id: rest.board_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/boards/{board-id}/members/{board-member-id}
      name: v2-boards-board-id-members-board-member-id
      description: REST surface for v2-boards-board_id-members-board_member_id.
      operations:
      - method: GET
        name: getspecificboardmember
        description: Get specific board member
        call: miro-board-members.getspecificboardmember
        with:
          board_id: rest.board_id
          board_member_id: rest.board_member_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateboardmember
        description: Update board member
        call: miro-board-members.updateboardmember
        with:
          board_id: rest.board_id
          board_member_id: rest.board_member_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeboardmember
        description: Remove board member
        call: miro-board-members.removeboardmember
        with:
          board_id: rest.board_id
          board_member_id: rest.board_member_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: miro-board-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Miro Developer Platform — Board members. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: share-board
      description: Share board
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: miro-board-members.shareboard
      with:
        board_id: tools.board_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-all-board-members
      description: Get all board members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: miro-board-members.getboardmembers
      with:
        limit: tools.limit
        offset: tools.offset
        board_id: tools.board_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-specific-board-member
      description: Get specific board member
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: miro-board-members.getspecificboardmember
      with:
        board_id: tools.board_id
        board_member_id: tools.board_member_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-board-member
      description: Update board member
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: miro-board-members.updateboardmember
      with:
        board_id: tools.board_id
        board_member_id: tools.board_member_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-board-member
      description: Remove board member
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: miro-board-members.removeboardmember
      with:
        board_id: tools.board_id
        board_member_id: tools.board_member_id
      outputParameters:
      - type: object
        mapping: $.
