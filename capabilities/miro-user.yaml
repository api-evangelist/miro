        destructive: false
        idempotent: false
      call: miro-user.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: miro-user.getuser
      with:
        id: tools.id
