naftiko: 1.0.0-alpha2
info:
  label: Miro Developer Platform — Organization Members
  description: 'Miro Developer Platform — Organization Members. 2 operations. Lead operation: Get organization members. Self-contained
    Naftiko capability covering one Miro business surface.'
  tags:
  - Miro
  - Organization Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MIRO_API_KEY: MIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: miro-organization-members
    baseUri: https://api.miro.com
    description: Miro Developer Platform — Organization Members business capability. Self-contained, no shared references.
    resources:
    - name: v2-orgs-org_id-members
      path: /v2/orgs/{org_id}/members
      operations:
      - name: enterprisegetorganizationmembers
        method: GET
        description: Get organization members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: emails
          in: query
          type: string
        - name: role
          in: query
          type: string
        - name: license
          in: query
          type: string
        - name: active
          in: query
          type: boolean
        - name: cursor
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: org_id
          in: path
          type: string
          description: id of the organization
          required: true
    - name: v2-orgs-org_id-members-member_id
      path: /v2/orgs/{org_id}/members/{member_id}
      operations:
      - name: enterprisegetorganizationmember
        method: GET
        description: Get organization member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: id of the organization
          required: true
        - name: member_id
          in: path
          type: string
          description: id of the organization member
          required: true
    authentication:
      type: bearer
      token: '{{env.MIRO_API_KEY}}'
  exposes:
  - type: rest
    namespace: miro-organization-members-rest
    port: 8080
    description: REST adapter for Miro Developer Platform — Organization Members. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v2/orgs/{org-id}/members
      name: v2-orgs-org-id-members
      description: REST surface for v2-orgs-org_id-members.
      operations:
      - method: GET
        name: enterprisegetorganizationmembers
        description: Get organization members
        call: miro-organization-members.enterprisegetorganizationmembers
        with:
          emails: rest.emails
          role: rest.role
          license: rest.license
          active: rest.active
          cursor: rest.cursor
          limit: rest.limit
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/orgs/{org-id}/members/{member-id}
      name: v2-orgs-org-id-members-member-id
      description: REST surface for v2-orgs-org_id-members-member_id.
      operations:
      - method: GET
        name: enterprisegetorganizationmember
        description: Get organization member
        call: miro-organization-members.enterprisegetorganizationmember
        with:
          org_id: rest.org_id
          member_id: rest.member_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: miro-organization-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Miro Developer Platform — Organization Members. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-organization-members
      description: Get organization members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: miro-organization-members.enterprisegetorganizationmembers
      with:
        emails: tools.emails
        role: tools.role
        license: tools.license
        active: tools.active
        cursor: tools.cursor
        limit: tools.limit
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-organization-member
      description: Get organization member
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: miro-organization-members.enterprisegetorganizationmember
      with:
        org_id: tools.org_id
        member_id: tools.member_id
      outputParameters:
      - type: object
        mapping: $.
