    resources:
    - name: v2-boards-board_id-connectors
      path: /v2/boards/{board_id}/connectors
      operations:
      - name: createconnector
        method: POST
        description: Create connector
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board for which you want to create the connector.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: getconnectors
        method: GET
        description: Get connectors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: string
        - name: cursor
          in: query
          type: string
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board from which you want to retrieve a list of connectors.
          required: true
