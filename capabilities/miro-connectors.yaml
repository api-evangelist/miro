      name: v2-boards-board-id-connectors
      description: REST surface for v2-boards-board_id-connectors.
      operations:
      - method: POST
        name: createconnector
        description: Create connector
        call: miro-connectors.createconnector
        with:
          board_id: rest.board_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
