naftiko: 1.0.0-alpha2
info:
  label: Miro Developer Platform — Card items
  description: 'Miro Developer Platform — Card items. 4 operations. Lead operation: Create card item. Self-contained Naftiko
    capability covering one Miro business surface.'
  tags:
  - Miro
  - Card items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MIRO_API_KEY: MIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: miro-card-items
    baseUri: https://api.miro.com
    description: Miro Developer Platform — Card items business capability. Self-contained, no shared references.
    resources:
    - name: v2-boards-board_id-cards
      path: /v2/boards/{board_id}/cards
      operations:
      - name: createcarditem
        method: POST
        description: Create card item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board where you want to create the item.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-boards-board_id-cards-item_id
      path: /v2/boards/{board_id}/cards/{item_id}
      operations:
      - name: getcarditem
        method: GET
        description: Get card item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board from which you want to retrieve a specific item.
          required: true
        - name: item_id
          in: path
          type: string
          description: Unique identifier (ID) of the item that you want to retrieve.
          required: true
      - name: updatecarditem
        method: PATCH
        description: Update card item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board where you want to update the item.
          required: true
        - name: item_id
          in: path
          type: string
          description: Unique identifier (ID) of the item that you want to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecarditem
        method: DELETE
        description: Delete card item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id
          in: path
          type: string
          description: Unique identifier (ID) of the board from which you want to delete the item.
          required: true
        - name: item_id
          in: path
          type: string
          description: Unique identifier (ID) of the item that you want to delete.
          required: true
    authentication:
      type: bearer
      token: '{{env.MIRO_API_KEY}}'
  exposes:
  - type: rest
    namespace: miro-card-items-rest
    port: 8080
    description: REST adapter for Miro Developer Platform — Card items. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/boards/{board-id}/cards
      name: v2-boards-board-id-cards
      description: REST surface for v2-boards-board_id-cards.
      operations:
      - method: POST
        name: createcarditem
        description: Create card item
        call: miro-card-items.createcarditem
        with:
          board_id: rest.board_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/boards/{board-id}/cards/{item-id}
      name: v2-boards-board-id-cards-item-id
      description: REST surface for v2-boards-board_id-cards-item_id.
      operations:
      - method: GET
        name: getcarditem
        description: Get card item
        call: miro-card-items.getcarditem
        with:
          board_id: rest.board_id
          item_id: rest.item_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatecarditem
        description: Update card item
        call: miro-card-items.updatecarditem
        with:
          board_id: rest.board_id
          item_id: rest.item_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecarditem
        description: Delete card item
        call: miro-card-items.deletecarditem
        with:
          board_id: rest.board_id
          item_id: rest.item_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: miro-card-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for Miro Developer Platform — Card items. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-card-item
      description: Create card item
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: miro-card-items.createcarditem
      with:
        board_id: tools.board_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-card-item
      description: Get card item
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: miro-card-items.getcarditem
      with:
        board_id: tools.board_id
        item_id: tools.item_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-card-item
      description: Update card item
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: miro-card-items.updatecarditem
      with:
        board_id: tools.board_id
        item_id: tools.item_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-card-item
      description: Delete card item
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: miro-card-items.deletecarditem
      with:
        board_id: tools.board_id
        item_id: tools.item_id
      outputParameters:
      - type: object
        mapping: $.
