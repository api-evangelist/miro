      with:
        board_id: tools.board_id
        item_id: tools.item_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-frame
      description: Update frame
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: miro-frames.updateframeitem
      with:
        board_id: tools.board_id
        item_id: tools.item_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-frame
      description: Delete frame
      hints:
        readOnly: false
        destructive: true
        idempotent: true
