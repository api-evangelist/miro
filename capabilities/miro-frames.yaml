        name: getframeitem
        description: Get frame
        call: miro-frames.getframeitem
        with:
          board_id: rest.board_id
          item_id: rest.item_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateframeitem
        description: Update frame
        call: miro-frames.updateframeitem
        with:
          board_id: rest.board_id
          item_id: rest.item_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
