naftiko: 1.0.0-alpha2
info:
  label: Miro Developer Platform — Teams
  description: 'Miro Developer Platform — Teams. 5 operations. Lead operation: Create team. Self-contained Naftiko capability
    covering one Miro business surface.'
  tags:
  - Miro
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MIRO_API_KEY: MIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: miro-teams
    baseUri: https://api.miro.com
    description: Miro Developer Platform — Teams business capability. Self-contained, no shared references.
    resources:
    - name: v2-orgs-org_id-teams
      path: /v2/orgs/{org_id}/teams
      operations:
      - name: enterprisecreateteam
        method: POST
        description: Create team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: enterprisegetteams
        method: GET
        description: List teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
          description: An indicator of the position of a page in the full set of results. To obtain the first page leave it
            empty. To obtain subsequent pages set it to the value retur
        - name: name
          in: query
          type: string
          description: Name query. Filters teams by name using case insensitive partial match. A value "dev" will return both
            "Developer's team" and "Team for developers".
    - name: v2-orgs-org_id-teams-team_id
      path: /v2/orgs/{org_id}/teams/{team_id}
      operations:
      - name: enterprisegetteam
        method: GET
        description: Get team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: enterpriseupdateteam
        method: PATCH
        description: Update team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: enterprisedeleteteam
        method: DELETE
        description: Delete team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MIRO_API_KEY}}'
  exposes:
  - type: rest
    namespace: miro-teams-rest
    port: 8080
    description: REST adapter for Miro Developer Platform — Teams. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/orgs/{org-id}/teams
      name: v2-orgs-org-id-teams
      description: REST surface for v2-orgs-org_id-teams.
      operations:
      - method: POST
        name: enterprisecreateteam
        description: Create team
        call: miro-teams.enterprisecreateteam
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: enterprisegetteams
        description: List teams
        call: miro-teams.enterprisegetteams
        with:
          limit: rest.limit
          cursor: rest.cursor
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/orgs/{org-id}/teams/{team-id}
      name: v2-orgs-org-id-teams-team-id
      description: REST surface for v2-orgs-org_id-teams-team_id.
      operations:
      - method: GET
        name: enterprisegetteam
        description: Get team
        call: miro-teams.enterprisegetteam
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: enterpriseupdateteam
        description: Update team
        call: miro-teams.enterpriseupdateteam
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: enterprisedeleteteam
        description: Delete team
        call: miro-teams.enterprisedeleteteam
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: miro-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Miro Developer Platform — Teams. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-team
      description: Create team
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: miro-teams.enterprisecreateteam
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-teams
      description: List teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: miro-teams.enterprisegetteams
      with:
        limit: tools.limit
        cursor: tools.cursor
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: get-team
      description: Get team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: miro-teams.enterprisegetteam
      outputParameters:
      - type: object
        mapping: $.
    - name: update-team
      description: Update team
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: miro-teams.enterpriseupdateteam
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-team
      description: Delete team
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: miro-teams.enterprisedeleteteam
      outputParameters:
      - type: object
        mapping: $.
