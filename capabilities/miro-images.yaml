naftiko: 1.0.0-alpha2
info:
  label: Miro Developer Platform — images
  description: 'Miro Developer Platform — images. 2 operations. Lead operation: Create image item using file from device.
    Self-contained Naftiko capability covering one Miro business surface.'
  tags:
  - Miro
  - images
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MIRO_API_KEY: MIRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: miro-images
    baseUri: https://api.miro.com
    description: Miro Developer Platform — images business capability. Self-contained, no shared references.
    resources:
    - name: v2-boards-board_id_PlatformFileUpload-images
      path: /v2/boards/{board_id_PlatformFileUpload}/images
      operations:
      - name: createimageitemusinglocalfile
        method: POST
        description: Create image item using file from device
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id_PlatformFileUpload
          in: path
          type: string
          description: Unique identifier (ID) of the board where you want to create the item.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-boards-board_id_PlatformFileUpload-images-item_id
      path: /v2/boards/{board_id_PlatformFileUpload}/images/{item_id}
      operations:
      - name: updateimageitemusingfilefromdevice
        method: PATCH
        description: Update image item using file from device
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: board_id_PlatformFileUpload
          in: path
          type: string
          description: Unique identifier (ID) of the board where you want to update the item.
          required: true
        - name: item_id
          in: path
          type: string
          description: Unique identifier (ID) of the item that you want to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MIRO_API_KEY}}'
  exposes:
  - type: rest
    namespace: miro-images-rest
    port: 8080
    description: REST adapter for Miro Developer Platform — images. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/boards/{board-id-platformfileupload}/images
      name: v2-boards-board-id-platformfileupload-images
      description: REST surface for v2-boards-board_id_PlatformFileUpload-images.
      operations:
      - method: POST
        name: createimageitemusinglocalfile
        description: Create image item using file from device
        call: miro-images.createimageitemusinglocalfile
        with:
          board_id_PlatformFileUpload: rest.board_id_PlatformFileUpload
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/boards/{board-id-platformfileupload}/images/{item-id}
      name: v2-boards-board-id-platformfileupload-images-item-id
      description: REST surface for v2-boards-board_id_PlatformFileUpload-images-item_id.
      operations:
      - method: PATCH
        name: updateimageitemusingfilefromdevice
        description: Update image item using file from device
        call: miro-images.updateimageitemusingfilefromdevice
        with:
          board_id_PlatformFileUpload: rest.board_id_PlatformFileUpload
          item_id: rest.item_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: miro-images-mcp
    port: 9090
    transport: http
    description: MCP adapter for Miro Developer Platform — images. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-image-item-using-file
      description: Create image item using file from device
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: miro-images.createimageitemusinglocalfile
      with:
        board_id_PlatformFileUpload: tools.board_id_PlatformFileUpload
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-image-item-using-file
      description: Update image item using file from device
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: miro-images.updateimageitemusingfilefromdevice
      with:
        board_id_PlatformFileUpload: tools.board_id_PlatformFileUpload
        item_id: tools.item_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
