      description: REST surface for v2-boards-board_id-sticky_notes.
      operations:
      - method: POST
        name: createstickynoteitem
        description: Create sticky note item
        call: miro-sticky-note-items.createstickynoteitem
        with:
          board_id: rest.board_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
